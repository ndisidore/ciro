[tools]
go = "1.25"
"golangci-lint" = "2.8.0"

[tasks.build]
description = "Build the ciro CLI binary"
run = "mkdir -p ./bin && go build -o ./bin/ciro ./cmd/ciro"

[tasks.test]
description = "Run all tests"
run = "go test -race ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.fmt]
description = "Format code"
run = "gofmt -w ."

[tasks."fmt:check"]
description = "Check formatting"
run = 'test -z "$(gofmt -l .)"'

[tasks.validate]
description = "Validate a KDL pipeline file"
usage = "validate <file>"
run = "go run ./cmd/ciro validate {{arg(name='file')}}"

[tasks.run]
description = "Run a KDL pipeline"
usage = "run <file>"
run = "go run ./cmd/ciro run {{arg(name='file')}}"

[tasks.ci]
description = "Run all CI checks"
depends = ["fmt:check", "vet", "lint", "test"]
